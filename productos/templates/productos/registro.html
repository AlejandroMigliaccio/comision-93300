{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta – Borderline 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }

        header {
            background-color: #f5f5f5;
            border-bottom: 1px solid #ddd;
            padding: 12px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header-logo-img { height: 56px; width: 56px; object-fit: contain; }
        .header-brand { display: flex; flex-direction: column; line-height: 1; text-decoration: none; }
        .header-brand-name {
            font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700;
            letter-spacing: 6px; text-transform: uppercase; color: #111;
        }
        .header-brand-sub {
            font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 5px;
            text-transform: uppercase; color: #666; margin-top: 3px;
        }

        .page-center {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: calc(100vh - 80px);
            padding: 40px 16px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
            padding: 40px 36px;
            width: 100%;
            max-width: 460px;
        }

        .card h1 {
            font-family: 'Cinzel', serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #111;
            margin-bottom: 28px;
            text-align: center;
        }

        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #444;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .field input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 7px;
            font-size: 15px;
            color: #222;
            outline: none;
            transition: border-color 0.2s;
        }
        .field input:focus { border-color: #3730a3; }

        .field-help {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            line-height: 1.4;
        }

        .errors {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 7px;
            padding: 10px 14px;
            margin-top: 6px;
            font-size: 13px;
            color: #dc2626;
        }
        .errors ul { padding-left: 16px; }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #3730a3;
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-submit:hover { background-color: #312e81; }

        .alt-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #555;
        }
        .alt-link a { color: #3730a3; text-decoration: none; font-weight: bold; }
        .alt-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <img src="{% static 'productos/img/logo.png' %}" alt="Borderline logo" class="header-logo-img">
        <a href="{% url 'home' %}" class="header-brand">
            <span class="header-brand-name">Borderline</span>
            <span class="header-brand-sub">3D Store</span>
        </a>
    </header>

    <div class="page-center">
        <div class="card">
            <h1>Crear cuenta</h1>

            <form method="post">
                {% csrf_token %}

                {% for field in form %}
                <div class="field">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                    <p class="field-help">{{ field.help_text }}</p>
                    {% endif %}
                    {% if field.errors %}
                    <div class="errors">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}

                <button type="submit" class="btn-submit">Registrarme</button>
            </form>

            <p class="alt-link">
                ¿Ya tenés cuenta? <a href="{% url 'login' %}">Iniciá sesión acá</a>
            </p>
        </div>
    </div>
</body>
</html>
